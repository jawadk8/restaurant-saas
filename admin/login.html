<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Admin Login</title>
    <meta
      name="description"
      content="Bella Cucina — cozy Italian restaurant offering handmade pasta, wood-fired pizza, and family recipes. Order online, book a table, or browse our menu."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-light">
    <div
      class="container d-flex align-items-center justify-content-center"
      style="min-height: 100vh"
    >
      <div class="card p-4" style="max-width: 400px; width: 100%">
        <h3 class="text-center mb-4">Admin Login</h3>

        <div id="loginError" class="alert alert-danger d-none" role="alert">
          Invalid username or password.
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="adminUsername" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="adminUsername"
              required
            />
          </div>
          <div class="mb-3">
            <label for="adminPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="adminPassword"
              required
            />
          </div>
          <button type="submit" class="btn btn-warning w-100">Log In</button>
        </form>

        <div class="text-center mt-3">
          <a href="../index.html" class="text-muted small">← Back to site</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin-auth.js"></script>
  </body>
</html>
