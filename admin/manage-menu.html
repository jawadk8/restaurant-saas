<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Manage Menu</title>
    <meta
      name="description"
      content="Bella Cucina — cozy Italian restaurant offering handmade pasta, wood-fired pizza, and family recipes. Order online, book a table, or browse our menu."
    />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- ADMIN NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="dashboard.html">Bella Cucina Admin</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="manage-menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-orders.html">Orders</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-reservations.html"
                >Reservations</a
              >
            </li>
            <li class="nav-item">
              <button
                class="btn btn-outline-light btn-sm ms-2"
                onclick="adminLogout()"
              >
                Log Out
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Manage Menu</h1>
        <button
          class="btn btn-warning"
          data-bs-toggle="modal"
          data-bs-target="#menuModal"
          onclick="openAddModal()"
        >
          + Add Dish
        </button>
      </div>

      <table class="table align-middle">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="adminMenuBody">
          <!-- rows inserted by admin-menu.js -->
        </tbody>
      </table>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div
      class="modal fade"
      id="menuModal"
      tabindex="-1"
      aria-labelledby="menuModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="menuForm">
            <div class="modal-header">
              <h5 class="modal-title" id="menuModalLabel">Add Dish</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <!-- Hidden field: empty = adding new, filled = editing existing -->
              <input type="hidden" id="menuItemId" />

              <div class="mb-3">
                <label for="menuName" class="form-label">Dish Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="menuName"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="menuCategory" class="form-label">Category</label>
                <select class="form-select" id="menuCategory" required>
                  <option value="Pasta">Pasta</option>
                  <option value="Pizza">Pizza</option>
                  <option value="Desserts">Desserts</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="menuPrice" class="form-label">Price ($)</label>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  class="form-control"
                  id="menuPrice"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="menuDescription" class="form-label"
                  >Description</label
                >
                <textarea
                  class="form-control"
                  id="menuDescription"
                  rows="2"
                  required
                ></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-warning">Save Dish</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/admin-auth.js"></script>
    <script src="../js/admin-menu.js"></script>
  </body>
</html>
