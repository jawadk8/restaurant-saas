<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Manage Orders</title>
    <meta
      name="description"
      content="Bella Cucina — cozy Italian restaurant offering handmade pasta, wood-fired pizza, and family recipes. Order online, book a table, or browse our menu."
    />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- ADMIN NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="dashboard.html">Bella Cucina Admin</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="manage-orders.html">Orders</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-reservations.html"
                >Reservations</a
              >
            </li>
            <li class="nav-item">
              <button
                class="btn btn-outline-light btn-sm ms-2"
                onclick="adminLogout()"
              >
                Log Out
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <h1 class="mb-4">Manage Orders</h1>

      <p id="noOrdersMessage" class="text-muted d-none">
        No orders placed yet.
      </p>

      <table class="table align-middle">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Date</th>
            <th>Status</th>
            <th>Update Status</th>
            <th>Items</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <!-- rows inserted by admin-orders.js -->
        </tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin-auth.js"></script>
    <script src="../js/admin-orders.js"></script>
  </body>
</html>
