<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Order Confirmed</title>
    <meta
      name="description"
      content="Bella Cucina — cozy Italian restaurant offering handmade pasta, wood-fired pizza, and family recipes. Order online, book a table, or browse our menu."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Bella Cucina</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="reservation.html">Reservations</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5 text-center" style="max-width: 600px">
      <!-- Shown if a valid order exists -->
      <div id="confirmationContent" class="d-none">
        <h1 class="text-success mb-3">✓ Order Confirmed!</h1>
        <p>Thanks, <span id="confirmName"></span>! Your order is on its way.</p>
        <p class="fs-5">
          <strong>Order ID:</strong> <span id="confirmOrderId"></span>
        </p>
        <p class="fs-5">
          <strong>Total:</strong> <span id="confirmTotal"></span>
        </p>
        <p class="text-muted"><span id="confirmDate"></span></p>
        <a href="menu.html" class="btn btn-warning mt-3">Order Again</a>
      </div>

      <!-- Shown if someone lands here without placing an order -->
      <div id="noOrderMessage" class="d-none">
        <h1>No recent order found.</h1>
        <a href="menu.html" class="btn btn-warning mt-3">Go to Menu</a>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; 2026 Bella Cucina. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const order = JSON.parse(localStorage.getItem("lastOrder"));

        if (!order) {
          document.getElementById("noOrderMessage").classList.remove("d-none");
          return;
        }

        document.getElementById("confirmName").textContent = order.name;
        document.getElementById("confirmOrderId").textContent = order.id;
        document.getElementById("confirmTotal").textContent = `$${order.total}`;
        document.getElementById("confirmDate").textContent = order.date;
        document
          .getElementById("confirmationContent")
          .classList.remove("d-none");
      });
    </script>
  </body>
</html>
