<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Checkout</title>
    <meta
      name="description"
      content="Bella Cucina — cozy Italian restaurant offering handmade pasta, wood-fired pizza, and family recipes. Order online, book a table, or browse our menu."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Bella Cucina</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="reservation.html">Reservations</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5" style="max-width: 600px">
      <h1 class="mb-4">Checkout</h1>

      <form id="checkoutForm" novalidate>
        <div class="mb-3">
          <label for="customerName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="customerName" required />
          <div class="invalid-feedback">Please enter your name.</div>
        </div>

        <div class="mb-3">
          <label for="customerEmail" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="customerEmail"
            required
          />
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <div class="mb-3">
          <label for="customerAddress" class="form-label"
            >Delivery Address</label
          >
          <textarea
            class="form-control"
            id="customerAddress"
            rows="2"
            required
          ></textarea>
          <div class="invalid-feedback">
            Please enter your delivery address.
          </div>
        </div>

        <div class="mb-3">
          <label for="paymentMethod" class="form-label">Payment Method</label>
          <select class="form-select" id="paymentMethod" required>
            <option value="" selected disabled>Choose...</option>
            <option value="card">Credit/Debit Card</option>
            <option value="cash">Cash on Delivery</option>
          </select>
          <div class="invalid-feedback">Please choose a payment method.</div>
        </div>

        <button type="submit" class="btn btn-warning btn-lg w-100">
          Place Order
        </button>
      </form>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; 2026 Bella Cucina. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
