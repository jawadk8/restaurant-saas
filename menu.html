<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Menu</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Bella Cucina</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="reservation.html">Reservations</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="cart.html">Cart</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="container text-center py-4">
      <h1>Our Menu</h1>
      <p class="text-muted">Filter by category to find what you're craving.</p>

      <!-- FILTER BUTTONS -->
      <div
        class="btn-group mb-4"
        role="group"
        aria-label="Menu category filters"
      >
        <button class="btn btn-outline-dark filter-btn" data-category="All">
          All
        </button>
        <button class="btn btn-outline-dark filter-btn" data-category="Pasta">
          Pasta
        </button>
        <button class="btn btn-outline-dark filter-btn" data-category="Pizza">
          Pizza
        </button>
        <button
          class="btn btn-outline-dark filter-btn"
          data-category="Desserts"
        >
          Desserts
        </button>
      </div>
    </div>

    <!-- MENU GRID (filled in by JS) -->
    <div class="container pb-5">
      <div class="row" id="menuContainer">
        <!-- dish cards get inserted here by menu.js -->
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; 2026 Bella Cucina. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Our JS files (order matters: data before menu) -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/menu.js"></script>
  </body>
</html>
