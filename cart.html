<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella Cucina | Cart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">Bella Cucina</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="menu.html">Menu</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="reservation.html">Reservations</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="cart.html">Cart</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <h1 class="mb-4">Your Cart</h1>

      <!-- Empty state (hidden by default, JS shows it if cart is empty) -->
      <p id="emptyCartMessage" class="text-muted d-none">
        Your cart is empty. Go add some delicious food!
      </p>

      <table class="table align-middle">
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cartBody">
          <!-- rows inserted by cart.js -->
        </tbody>
      </table>

      <div class="text-end">
        <h4>Total: <span id="cartTotal">$0.00</span></h4>
        <a href="checkout.html" class="btn btn-warning btn-lg mt-2"
          >Proceed to Checkout</a
        >
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
      <div class="container">
        <p class="mb-0">&copy; 2026 Bella Cucina. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
      // Page-specific init + button handlers for THIS page only
      document.addEventListener("DOMContentLoaded", () => {
        renderCart();

        document.getElementById("cartBody").addEventListener("click", (e) => {
          const id = Number(e.target.dataset.id);

          if (e.target.matches(".remove-btn")) {
            removeFromCart(id);
            renderCart();
          }

          if (e.target.matches(".qty-btn")) {
            const item = cart.find((item) => item.id === id);
            const action = e.target.dataset.action;
            const newQty =
              action === "increase" ? item.quantity + 1 : item.quantity - 1;
            updateQuantity(id, newQty);
            renderCart();
          }
        });
      });
    </script>
  </body>
</html>
